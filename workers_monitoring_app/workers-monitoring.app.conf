id: "workers-monitoring"
version: "1.1.3"
name: "Workers Monitoring"
provider: "Alex Golunov"
description: "Workers monitor"
icon: "${ASSET:app-p-workers-monitor@2x.png}"
badges: []
details_page: "task"

task {
  # task fields to use when creating the application task
  # will probably be a dump from an existing task by the creator of the app
  script {
    repository: "https://github.com/golunovas/clrml-custom-apps.git"
    entry_point: "workers_monitor.py"
    working_dir: "workers_monitoring_app"
    tag: ""
  }
  hyperparams {
    Args {
      period: 60
      config: ""
      slack_token: ""
      slack_channel: ""
      slack_notify_hour: 12
      slack_notify_weekday: 0
      gpu_threshold: 10
      min_session_days: 2
    },
  }

}

wizard {
  entries: [
    {
      type: integer
      name: update_period
      title: Update period
      info: "Period for stats updates"
      default: 60
      target {
        field: hyperparams
        section: Args
        name: period
      }
    },
    {
      type: multiline_text
      name: config
      title: Additional ClearML Configuration
      info: "Config for monitoring"
      required: true
      target: {
        field: hyperparams
        section: Args
        name: config
        format: json  # dump a json into the configuration item, where the value from this entry will be placed under the "field" key
      }
    },
    {
      type: string
      name: slack_token
      title: Slack Bot Token
      info: "Slack bot token for sending alerts"
      target {
        field: hyperparams
        section: Args
        name: slack_token
      }
    },
    {
      type: string
      name: slack_channel
      title: Slack Channel
      info: "Slack channel to post alerts to"
      target {
        field: hyperparams
        section: Args
        name: slack_channel
      }
    },
    {
      type: integer
      name: slack_notify_hour
      title: Slack Notify Hour (UTC)
      info: "UTC hour (0-23) at which to send the Slack alert"
      default: 12
      target {
        field: hyperparams
        section: Args
        name: slack_notify_hour
      }
    },
    {
      type: integer
      name: slack_notify_weekday
      title: Slack Notify Weekday
      info: "Weekday to notify on (0=Mon, 6=Sun)"
      default: 0
      target {
        field: hyperparams
        section: Args
        name: slack_notify_weekday
      }
    },
    {
      type: integer
      name: gpu_threshold
      title: GPU Utilization Threshold (%)
      info: "Avg GPU usage % below which a session is alerted"
      default: 10
      target {
        field: hyperparams
        section: Args
        name: gpu_threshold
      }
    },
    {
      type: integer
      name: min_session_days
      title: Minimum Session Age (days)
      info: "Minimum session age in days before it is eligible for Slack alerting"
      default: 2
      target {
        field: hyperparams
        section: Args
        name: min_session_days
      }
    }
  ]
}

dashboard {
  lines: [
    {
      contents: [
        {
          title: "Available workers"
          type: plot
          metric: "available_workers"
          variant: "queue"
        }
      ]
    },
    {
      contents: [
        {
          title: "Interactive sessions"
          type: plot
          metric: "interactive_sessions"
          variant: "sessions"
        }
      ]
    },
    {
      contents: [
        {
          title: "Usage by user"
          type: plot
          metric: "usage_by_user"
          variant: "usage"
        }
      ]
    },
  ]
}